services:
  backend:
    image: ghcr.io/homebitcoinminers/bitscope-backend:latest
    container_name: bitscope-backend
    restart: unless-stopped
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - SCAN_SUBNETS=${SCAN_SUBNETS:-192.168.60.0/24}
      - POLL_INTERVAL=${POLL_INTERVAL:-30}
      - SCAN_INTERVAL=${SCAN_INTERVAL:-300}
      - DATA_RETENTION_DAYS=${DATA_RETENTION_DAYS:-365}
    volumes:
      - bitscope_data:/data
    ports:
      - "8000:8000"
    networks:
      - bitscope

  frontend:
    image: ghcr.io/homebitcoinminers/bitscope-frontend:latest
    container_name: bitscope-frontend
    restart: unless-stopped
    environment:
      # URL the nginx proxy uses to reach the backend — must be reachable from inside this container.
      # Default assumes both services are on the same Docker Compose network (service name = hostname).
      # Change if you rename the backend service or run containers on separate networks:
      #   BITSCOPE_BACKEND_URL=http://192.168.1.50:8000
      - BITSCOPE_BACKEND_URL=${BITSCOPE_BACKEND_URL:-http://backend:8000}
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - bitscope

volumes:
  bitscope_data:

networks:
  bitscope:
